version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vibe-starterkit-app
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: starter_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: >
      sh -lc "composer install --no-interaction &&
      php artisan key:generate --force &&
      php artisan migrate --seed --force &&
      php artisan serve --host=0.0.0.0 --port=8000"

  db:
    image: postgres:16-alpine
    container_name: vibe-starterkit-db
    environment:
      POSTGRES_DB: starter_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - vibe_starterkit_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d starter_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  vibe_starterkit_pgdata:
