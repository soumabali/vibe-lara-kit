openapi: 3.1.0
info:
  title: Vibe Starter Kit API
  version: 1.0.0
servers:
  - url: http://localhost:8000/api/v1

tags:
  - name: Auth

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Register user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name: { type: string }
                email: { type: string, format: email }
                password: { type: string, minLength: 8 }
            example:
              name: Jane Doe
              email: jane@example.com
              password: password123
      responses:
        '201':
          description: Registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      user:
                        type: object
                        properties:
                          id: { type: integer }
                          name: { type: string }
                          email: { type: string }
                      token: { type: string }
              example:
                data:
                  user:
                    id: 10
                    name: Jane Doe
                    email: jane@example.com
                  token: 10|abcdefghijklmnopqrstuvwxyz

  /auth/login:
    post:
      tags: [Auth]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
            example:
              email: admin@example.com
              password: password123
      responses:
        '200':
          description: Logged in
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      token: { type: string }
              example:
                data:
                  token: 1|abcdefghijklmnopqrstuvwxyz

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id: { type: integer }
                      name: { type: string }
                      email: { type: string }
                      is_admin: { type: boolean }
              example:
                data:
                  id: 1
                  name: Admin
                  email: admin@example.com
                  is_admin: true

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout current token
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      message: { type: string }
              example:
                data:
                  message: Logged out

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Token
